<!DOCTYPE html>
<html>
<head>
    <title>MY Weather App</title>
     <link rel="stylesheet" href="style.css">
 <style>
        /* Simple styling to make it look clean */
        body { font-family: 'Segoe UI',Roboto, sans-serif; text-align: center; background: #754646; padding: 50px; }
        .card { background:rgb(22, 13, 13); padding: 20px; color: white; border-radius: 12px; display: flex; shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        input { padding: 12px; border: 1px solid black; border-radius: 5px; }
        button { padding: 12px; background: #80676700; color:rgb(250, 249, 249); border: none; border-radius: 5px; cursor: pointer; }
        #result { margin-top: 20px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Weather Checker</h2>
        <!-- Input field for the city name -->
        <input type="text" id="cityInput" placeholder="Enter city name...">
        <button onclick="getWeather()">Search</button>

        <!-- Where the weather info will appear -->
        <div id="result"></div>
    </div>

    <script>
        function getWeather() {
            const city = document.getElementById('cityInput').value;
            const resultDiv = document.getElementById('result');
            
            // 1. Replace 'YOUR_API_KEY_HERE' with your actual key from OpenWeatherMap
            const apiKey = 'be7b1f0fe3a5a9ddc90d74d8cb00fcfc'; 
             const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=be7b1f0fe3a5a9ddc90d74d8cb00fcfc&units=metric`;



            // 2. Clear previous results and show "Loading..."
            resultDiv.innerHTML = "Searching...";

            // 3. The "Fetch" command gets data from the internet
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error("City not found");
                    return response.json();
                })
                .then(data => {
                    // 4. Update the page with the data we found
                    resultDiv.innerHTML = `
                        <h3>${data.name}, ${data.sys.country}</h3>
                        <p>Temperature: <b>${data.main.temp}°C</b></p>
                        <p>Condition: ${data.weather[0].description}</p>
                    `;
                })
                .catch(error => {
                    // 5. Handle errors (like typos)
                    resultDiv.innerHTML = "❌ Error: " + error.message;
                });
        }  
          <scrip src="script.js"></script>

    </body>
</html>
